<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日复盘 — 2026-07-11</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root {
  --white:#ffffff;--bg:#f8f8f8;
  --bg-card:rgba(255,255,255,0.85);--bg-card-hover:rgba(255,255,255,0.95);
  --ink:#1a1a1a;--ink-secondary:#6e6e7a;--ink-tertiary:#9a9aa8;--ink-quaternary:#c4c4d0;
  --border:rgba(0,0,0,0.05);--border-strong:rgba(0,0,0,0.08);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
  --shadow-md:0 4px 16px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.02);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.05),0 4px 16px rgba(0,0,0,0.02);
  --accent:#c4a35a;--accent-light:rgba(196,163,90,0.10);--accent-mid:rgba(196,163,90,0.20);
  --green:#5a9a7a;--green-light:rgba(90,154,122,0.10);
  --red:#c45a5a;--red-light:rgba(196,90,90,0.10);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --font-serif:'Noto Serif SC','Source Han Serif SC',serif;
  --font-sans:'Noto Sans SC',-apple-system,'PingFang SC','Helvetica Neue',sans-serif;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 5%,rgba(196,163,90,0.04) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 95%,rgba(106,138,184,0.03) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{max-width:720px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1}
.app-header{position:sticky;top:20px;z-index:100;max-width:680px;margin:0 auto 24px;padding:12px 24px;background:var(--bg-card);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-family:var(--font-serif);font-size:clamp(16px,2.2vw,20px);font-weight:700;color:var(--ink);letter-spacing:0.02em}
.header-badge{font-size:12px;padding:4px 12px;border-radius:100px;background:var(--accent-light);color:var(--accent);font-weight:600;letter-spacing:0.3px}
.hero{text-align:center;padding:36px 20px 28px}
.hero .date{font-size:13px;color:var(--ink-tertiary);font-weight:500;letter-spacing:0.3px}
.hero h2{font-family:var(--font-serif);font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--ink);letter-spacing:-0.01em;margin-top:6px}
.card{background:var(--bg-card);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:box-shadow 0.25s,background 0.25s}
.card:hover{box-shadow:var(--shadow-md);background:var(--bg-card-hover)}
.card-title{font-size:11px;font-weight:600;color:var(--ink-tertiary);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title .icon{font-size:14px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:12px;padding:3px 10px;border-radius:100px;background:var(--accent-light);color:var(--accent);font-weight:500}
.text-content{font-size:14px;color:var(--ink);line-height:1.6}
.text-content strong{color:var(--accent)}
.back-btn{display:inline-block;margin-top:20px;font-size:13px;color:var(--ink-tertiary);text-decoration:none;font-weight:500}
.back-btn:hover{color:var(--accent)}
@media(max-width:600px){
  .app-header{top:12px;margin:0 12px 20px;padding:10px 16px;border-radius:var(--radius)}
  .hero{padding:24px 12px 20px}
  .card{padding:18px;border-radius:var(--radius)}
}
</style>
</head>
<body>

<header class="app-header">
  <h1>每日复盘</h1>
  <span class="header-badge">Daily Review</span>
</header>

<div class="container">
  <section class="hero">
    <div class="date">2026-07-11 · 周六</div>
    <h2>灵修安息日 · 无工作记录</h2>
    <div class="tag-list" style="margin-top:12px;justify-content:center">
      <span class="tag">休息日</span>
      <span class="tag">灵修</span>
      <span class="tag">周末</span>
    </div>
  </section>

  <div class="card">
    <div class="card-title"><span class="icon">📋</span> 今日总结</div>
    <div class="text-content">
      <p style="padding:8px 0">周末休息日，各项目均无工作记录。好好休息，养精蓄锐 🦞</p>
    </div>
  </div>

  <a href="index.html" class="back-btn">← 返回总览</a>
</div>
</body>
</html>
